#cloud-config

runcmd:
  - date > /tmp/install_start
  - dnf -y update
  - dnf -y install python3 python3-devel wget ansible nginx vim
  - dnf -y groupinstall 'development tools'
  - wget https://releases.hashicorp.com/terraform/0.12.24/terraform_0.12.24_linux_amd64.zip -P /tmp
  - unzip /tmp/terraform_0.12.24_linux_amd64.zip -d /usr/local/bin
  - dnf config-manager --add-repo=https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install docker-ce --nobest -y
  - setsebool -P httpd_can_network_connect 1
  - setenforce permissive
  - alternatives --set python /usr/bin/python3
  - systemctl enable docker
  - systemctl enable nginx
  - while [ ! -f /tmp/nginx.conf ]; do sleep 2; done
  - mv /tmp/nginx.conf /etc/nginx/nginx.conf
  - date > /tmp/install_done


output:
    init:
        output: "> /var/log/cloud-init.out"
        error: "> /var/log/cloud-init.err"
    config: "tee -a /var/log/cloud-config.log"
    final:
        - ">> /var/log/cloud-final.out"
        - "/var/log/cloud-final.err"
